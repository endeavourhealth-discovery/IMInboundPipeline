ext {
  versions = [
    assertJ           : '3.26.3',
    awsSDKBOM         : '2.28.13',
    awsSDKCore        : '2.28.13',
    cucumber          : '7.15.0',
    jackson           : '2.16.0',
    jslt              : "0.1.14",
    junit             : '5.10.1',
    junitRunner       : '1.10.1',
    lombok            : '1.18.30',
    mockito           : '5.14.2',
      postgresql          : '42.7.5',
    spring            : '3.3.2',
    springdoc         : '2.3.0',
    springContext     : '6.1.1',
    springTestSecurity: '6.2.0',
    systemStubs       : '2.1.7',
    rabbitmqAmqpClient: '5.24.0',
    springAmpq        : '3.4.1',
    orgJson           : "20250107",
    awsS3             : "2.30.11"
  ]
  libs = [
    assertJ           : "org.assertj:assertj-core:$versions.assertJ",
    awsSDKBOM         : "software.amazon.awssdk:bom:$versions.awsSDKBOM",
    awsSDKCore        : "software.amazon.awssdk:core:$versions.awsSDKCore",
    cucumber          : "io.cucumber:cucumber-java:$versions.cucumber",
    cucumberJunit     : "io.cucumber:cucumber-java:$versions.cucumber",
    jacksonAnnotations: "com.fasterxml.jackson.core:jackson-annotations:$versions.jackson",
    jacksonDatabind   : "com.fasterxml.jackson.core:jackson-databind:$versions.jackson",
    jslt              : "com.schibsted.spt.data:jslt:$versions.jslt",
    junit             : "org.junit.jupiter:junit-jupiter-api:$versions.junit",
    junitSuite        : "org.junit.platform:junit-platform-suite:$versions.junitSuite",
    lombok            : "org.projectlombok:lombok:$versions.lombok",
    mockito           : "org.mockito:mockito-junit-jupiter:$versions.mockito",
    postgresql        : "org.postgresql:postgresql:$versions.postgresql",
    springContext     : "org.springframework:spring-context:$versions.springContext",
    springDataJpa     : "org.springframework.boot:spring-boot-starter-data-jpa:$versions.spring",
    springDevTools    : "org.springframework.boot:spring-boot-devtools:$versions.spring",
    springdoc         : "org.springdoc:springdoc-openapi-starter-webmvc-ui:$versions.springdoc",
    springOauthServer : "org.springframework.boot:spring-boot-starter-oauth2-resource-server:$versions.spring",
    springSecurity    : "org.springframework.boot:spring-boot-starter-security:$versions.spring",
    springTest        : "org.springframework.boot:spring-boot-starter-test:$versions.spring",
    springTestSecurity: "org.springframework.security:spring-security-test:$versions.springTestSecurity",
    springTomcat      : "org.springframework.boot:spring-boot-starter-tomcat:$versions.spring",
    springWeb         : "org.springframework.boot:spring-boot-starter-web:$versions.spring",
    systemStubs       : "uk.org.webcompere:system-stubs-jupiter:$versions.systemStubs",
    rabbitmqAmqpClient: "com.rabbitmq:amqp-client:$versions.rabbitmqAmqpClient",
    springAmpq        : "org.springframework.boot:spring-boot-starter-amqp:$versions.springAmpq",
    orgJson           : "org.json:json:$versions.orgJson",
    awsS3             : "software.amazon.awssdk:s3:$versions.awsS3"
  ]
}